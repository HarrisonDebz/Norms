<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be My Girlfriend? ❤️</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts for a premium look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Pacifico&display=swap" rel="stylesheet">
</head>
<body>
    <div id="particles-container"></div>
    <div id="background-gradient"></div>

    <main class="container">
        <section id="proposal-section" class="card">
            <div class="emoji-container">
                <span class="main-emoji">🥺</span>
            </div>
            <h1 class="title">Will you be my <span class="highlight">girlfriend</span>?</h1>
            <p class="subtitle">You make my heart skip a beat every single day...</p>
            
            <div class="button-group">
                <button id="yes-btn" class="btn btn-yes">Yes! ❤️</button>
                <button id="no-btn" class="btn btn-no">No 😢</button>
            </div>
        </section>

        <section id="celebration-section" class="card hidden">
            <div class="emoji-container">
                <span class="main-emoji">🎉</span>
            </div>
            <h1 class="title">Yay! I'm so happy! ❤️</h1>
            <p class="subtitle">I promise to always make you smile and cherish every moment together.</p>
            <div class="celebration-content">
                <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJmZzI0Z3JzZzJzZzJzZzJzZzJzZzJzZzJzZzJzZzJzJm9wZW5fcmVzb3VyY2U9MTYyMjg0MDExJmxpbms9ZGlyZWN0/MDJ99W9Dg3280/giphy.gif" alt="Happy Cat" class="celebration-gif">
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
